name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tauri:
    name: Tauri (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('fastboot-flasher-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fastboot-flasher-ui/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: fastboot-flasher-ui
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0.6.2
        with:
          projectPath: fastboot-flasher-ui

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: fastboot-flasher-ui/src-tauri/target/release/bundle/**/*

  release:
    name: Release
    needs: [build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
