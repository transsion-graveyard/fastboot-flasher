name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish"
        required: true
        type: string
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-tauri:
    name: Tauri (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('fastboot-flasher-ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os != 'Windows'

      - uses: dtolnay/rust-toolchain@stable
        if: runner.os == 'Windows'
        with:
          targets: i686-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fastboot-flasher-ui/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: fastboot-flasher-ui
        run: pnpm install

      - name: Build Tauri bundle (Linux)
        if: runner.os == 'Linux'
        working-directory: fastboot-flasher-ui
        run: pnpm tauri build

      - name: Build Tauri bundle (Windows x86)
        if: runner.os == 'Windows'
        working-directory: fastboot-flasher-ui
        run: pnpm tauri build --target i686-pc-windows-msvc

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: |
            fastboot-flasher-ui/src-tauri/target/release/bundle/deb/*.deb
            fastboot-flasher-ui/src-tauri/target/release/bundle/rpm/*.rpm
            fastboot-flasher-ui/src-tauri/target/release/bundle/msi/*.msi
            fastboot-flasher-ui/src-tauri/target/release/bundle/nsis/*.exe
            fastboot-flasher-ui/src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi
            fastboot-flasher-ui/src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe

  release:
    name: Release
    needs: [build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: artifacts
          merge-multiple: true

      - name: Classify release
        id: classify
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "branch" ]; then
            TAG="nightly-$(date +'%Y%m%d-%H%M%S')"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            if echo "$TAG" | grep -q -- '-'; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          BODY="## What's Changed"
          if [ -z "$PREV" ]; then
            BODY="$BODY\n\nInitial release."
          else
            ENTRIES=$(git log "$PREV..HEAD" --no-merges --format='### %s%n%b' | sed '/^[[:space:]]*$/d')
            BODY="$BODY\n\n$ENTRIES"
          fi
          {
            echo 'body<<EOF'
            printf "%b" "$BODY"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.classify.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*.exe
          draft: false
          prerelease: ${{ steps.classify.outputs.prerelease }}
          make_latest: ${{ steps.classify.outputs.make_latest }}
          fail_on_unmatched_files: true
